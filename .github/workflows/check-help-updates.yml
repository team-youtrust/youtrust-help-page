name: Check Help Page Updates

on:
  schedule:
    - cron: '0 0 * * 1-5'  # 平日 09:00 JST (00:00 UTC)
  workflow_dispatch:  # 手動実行用

permissions:
  models: read
  contents: write
  pull-requests: write

jobs:
  check-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout help-page repository
        uses: actions/checkout@v4

      # TODO: テスト後に '24 hours ago' に戻す
      - name: Get merged PRs from youtrust-webapp (last 24h)
        id: webapp-prs
        env:
          GH_TOKEN: ${{ secrets.PAT_GITHUB }}
        run: |
          SINCE=$(date -u -d '120 hours ago' '+%Y-%m-%dT%H:%M:%SZ')
          gh pr list --repo team-youtrust/youtrust-webapp \
            --state merged \
            --limit 100 \
            --json number,title,body,mergedAt,url,labels \
            | jq --arg since "$SINCE" '[.[] | select(.mergedAt >= $since) | {number, title, url, repo: "webapp", labels: [.labels[].name], body: (.body | split("\n")[0:5] | join("\n") | .[0:300])}]' \
            > webapp_prs.json
          echo "count=$(jq length webapp_prs.json)" >> $GITHUB_OUTPUT

      # TODO: テスト後に '24 hours ago' に戻す
      - name: Get merged PRs from youtrust-nativeapp (last 24h)
        id: nativeapp-prs
        env:
          GH_TOKEN: ${{ secrets.PAT_GITHUB }}
        run: |
          SINCE=$(date -u -d '120 hours ago' '+%Y-%m-%dT%H:%M:%SZ')
          gh pr list --repo team-youtrust/youtrust-nativeapp \
            --state merged \
            --limit 100 \
            --json number,title,body,mergedAt,url,labels \
            | jq --arg since "$SINCE" '[.[] | select(.mergedAt >= $since) | {number, title, url, repo: "nativeapp", labels: [.labels[].name], body: (.body | split("\n")[0:5] | join("\n") | .[0:300])}]' \
            > nativeapp_prs.json
          echo "count=$(jq length nativeapp_prs.json)" >> $GITHUB_OUTPUT

      - name: Combine and split PR data into batches
        id: combine
        run: |
          # 全PRを結合
          jq -s 'add' webapp_prs.json nativeapp_prs.json > all_prs.json
          TOTAL=$(jq length all_prs.json)
          echo "total=$TOTAL" >> $GITHUB_OUTPUT

          # 5件ずつバッチに分割
          mkdir -p batches
          jq -c '[_nwise(5)]' all_prs.json | jq -c '.[]' | nl -v 0 | while read idx batch; do
            echo "$batch" > "batches/batch_$idx.json"
          done
          BATCH_COUNT=$(ls batches/*.json 2>/dev/null | wc -l | tr -d ' ')
          echo "batch_count=$BATCH_COUNT" >> $GITHUB_OUTPUT

      - name: Extract help page structure from mkdocs.yml
        if: steps.combine.outputs.total != '0'
        id: structure
        run: |
          # navセクションを抽出
          sed -n '/^nav:/,/^[a-z]/p' mkdocs.yml | head -n -1 > help_structure.txt
          echo "structure<<EOF" >> $GITHUB_OUTPUT
          cat help_structure.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Skip if no PRs
        if: steps.combine.outputs.total == '0'
        run: echo "No merged PRs in the last 24 hours. Skipping."

      - name: Analyze PRs with AI (batch processing)
        if: steps.combine.outputs.total != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 判断基準を読み込み
          CRITERIA=$(cat .github/prompts/help-criteria.md)
          STRUCTURE="${{ steps.structure.outputs.structure }}"

          # 結果を格納する配列を初期化
          echo '{"has_impact": false, "items": [], "skipped_prs": []}' > final_result.json

          # 各バッチを処理
          for batch_file in batches/batch_*.json; do
            echo "Processing $batch_file..."
            BATCH_DATA=$(cat "$batch_file")

            # プロンプトを構築
            PROMPT=$(cat <<PROMPT_EOF
          あなたはYOUTRUSTのヘルプページ管理アシスタントです。
          PRの変更内容を分析し、ヘルプページの更新が必要かどうかを判定してください。

          ## 現在のヘルプページ構成
          $STRUCTURE

          ## 判断基準
          $CRITERIA

          ## 分析対象のPR情報
          $BATCH_DATA

          ## 出力形式
          必ずJSON形式のみで出力してください。説明文は不要です。
          {
            "has_impact": true または false,
            "items": [
              {
                "action": "add" または "update" または "delete",
                "labels": ["help:add"] など,
                "target_path": "user/account/xxx.md",
                "target_section": "一般ユーザー向け または 公式リクルーター向け",
                "pr_title": "元PRのタイトル",
                "pr_number": 123,
                "pr_repo": "webapp または nativeapp",
                "pr_url": "https://github.com/...",
                "reason": "なぜ更新が必要か（日本語）",
                "suggestion": "具体的な追記内容（コードは絶対に含めない）"
              }
            ],
            "skipped_prs": [
              {
                "pr_title": "スキップしたPRのタイトル",
                "pr_number": 123,
                "pr_repo": "webapp",
                "reason": "スキップ理由"
              }
            ]
          }
          PROMPT_EOF
          )

            # GitHub Models APIを呼び出し
            RESPONSE=$(curl -s -X POST "https://models.github.ai/inference/chat/completions" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg prompt "$PROMPT" '{
                "model": "openai/gpt-4o",
                "messages": [{"role": "user", "content": $prompt}],
                "max_tokens": 2000
              }')")

            # レスポンスからJSONを抽出
            CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty' 2>/dev/null || echo "")
            if [ -z "$CONTENT" ]; then
              echo "Warning: Empty or invalid response for $batch_file"
              echo "Response: $(echo "$RESPONSE" | head -c 200)"
              continue
            fi

            # マークダウンコードブロックを除去
            CLEAN_JSON=$(echo "$CONTENT" | sed -n '/```json/,/```/p' | sed '1d;$d')
            if [ -z "$CLEAN_JSON" ]; then
              CLEAN_JSON="$CONTENT"
            fi

            # 結果をマージ
            echo "$CLEAN_JSON" > batch_result.json
            if jq -e . batch_result.json > /dev/null 2>&1; then
              # has_impactがtrueならfinal_resultもtrueに
              HAS_IMPACT=$(jq -r '.has_impact // false' batch_result.json 2>/dev/null || echo "false")
              if [ "$HAS_IMPACT" = "true" ]; then
                jq '.has_impact = true' final_result.json > tmp.json 2>/dev/null && mv tmp.json final_result.json
              fi
              # itemsをマージ
              if jq -s '.[0].items += (.[1].items // []) | .[0].skipped_prs += (.[1].skipped_prs // []) | .[0]' final_result.json batch_result.json > tmp.json 2>/dev/null; then
                mv tmp.json final_result.json
              else
                echo "Warning: Failed to merge $batch_file, skipping..."
              fi
            else
              echo "Warning: Invalid JSON in $batch_file, skipping..."
            fi
          done

          # 最終結果を保存
          cp final_result.json ai_response.json

      - name: Check AI response
        if: steps.combine.outputs.total != '0'
        id: save
        run: |
          cat ai_response.json
          HAS_IMPACT=$(jq -r '.has_impact // false' ai_response.json)
          echo "has_impact=$HAS_IMPACT" >> $GITHUB_OUTPUT

      - name: Refine update suggestions with existing content
        if: steps.save.outputs.has_impact == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # updateアクションのアイテムを抽出
          UPDATE_ITEMS=$(jq -c '[.items[] | select(.action == "update")]' ai_response.json)
          UPDATE_COUNT=$(echo "$UPDATE_ITEMS" | jq length)

          if [ "$UPDATE_COUNT" -eq 0 ]; then
            echo "No update items to refine."
            exit 0
          fi

          echo "Refining $UPDATE_COUNT update items with existing content..."

          # 判断基準を読み込み
          CRITERIA=$(cat .github/prompts/help-criteria.md)

          # 各updateアイテムを処理
          for i in $(seq 0 $((UPDATE_COUNT - 1))); do
            ITEM=$(echo "$UPDATE_ITEMS" | jq -c ".[$i]")
            TARGET_PATH=$(echo "$ITEM" | jq -r '.target_path')
            PR_TITLE=$(echo "$ITEM" | jq -r '.pr_title')
            PR_NUMBER=$(echo "$ITEM" | jq -r '.pr_number')
            REASON=$(echo "$ITEM" | jq -r '.reason')

            # マークダウンファイルを読み込み
            MD_FILE="docs/$TARGET_PATH"
            if [ ! -f "$MD_FILE" ]; then
              echo "Warning: File not found: $MD_FILE"
              continue
            fi

            # ファイルサイズを制限（最初の3000文字）
            EXISTING_CONTENT=$(head -c 3000 "$MD_FILE")

            echo "Refining suggestion for: $TARGET_PATH"

            # プロンプトを構築
            PROMPT=$(cat <<PROMPT_EOF
          あなたはYOUTRUSTのヘルプページ管理アシスタントです。
          既存のヘルプページ内容を参照して、より具体的な修正提案を作成してください。

          ## 判断基準
          $CRITERIA

          ## PR情報
          - タイトル: $PR_TITLE
          - PR番号: $PR_NUMBER
          - 更新理由: $REASON

          ## 既存のヘルプページ内容
          ファイル: $TARGET_PATH
          \`\`\`markdown
          $EXISTING_CONTENT
          \`\`\`

          ## 出力形式
          必ずJSON形式のみで出力してください。説明文は不要です。
          {
            "refined_suggestion": "具体的にどの部分をどう修正すべきか（コードは絶対に含めない、日本語で200文字以内）"
          }

          注意:
          - 既存の文章構造やスタイルに合わせた提案をしてください
          - どのセクションに追記・修正すべきか具体的に指定してください
          - コードや実装詳細は絶対に含めないでください
          PROMPT_EOF
          )

            # GitHub Models APIを呼び出し
            RESPONSE=$(curl -s -X POST "https://models.github.ai/inference/chat/completions" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg prompt "$PROMPT" '{
                "model": "openai/gpt-4o",
                "messages": [{"role": "user", "content": $prompt}],
                "max_tokens": 500
              }')")

            # レスポンスからJSONを抽出
            CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')
            if [ -z "$CONTENT" ]; then
              echo "Warning: Empty response for $TARGET_PATH"
              continue
            fi

            # マークダウンコードブロックを除去
            CLEAN_JSON=$(echo "$CONTENT" | sed -n '/```json/,/```/p' | sed '1d;$d')
            if [ -z "$CLEAN_JSON" ]; then
              CLEAN_JSON="$CONTENT"
            fi

            # refined_suggestionを抽出
            REFINED=$(echo "$CLEAN_JSON" | jq -r '.refined_suggestion // empty')
            if [ -n "$REFINED" ]; then
              # ai_response.jsonの該当アイテムのsuggestionを更新
              jq --arg path "$TARGET_PATH" --arg pr "$PR_NUMBER" --arg refined "$REFINED" \
                '(.items[] | select(.target_path == $path and (.pr_number | tostring) == $pr)).suggestion = $refined' \
                ai_response.json > tmp.json && mv tmp.json ai_response.json
              echo "Updated suggestion for $TARGET_PATH"
            fi
          done

          echo "Refinement complete."
          cat ai_response.json

      - name: Prepare service-specific data
        id: prepare-data
        if: steps.save.outputs.has_impact == 'true'
        run: |
          # サービス別の件数を計算
          SNS_ITEMS=$(jq '[.items[] | select(.target_section == "一般ユーザー向け")] | length' ai_response.json)
          CLWEB_ITEMS=$(jq '[.items[] | select(.target_section == "公式リクルーター向け")] | length' ai_response.json)
          WEBAPP_SKIPPED=$(jq '[.skipped_prs[] | select(.pr_repo == "webapp")] | length' ai_response.json)
          NATIVEAPP_SKIPPED=$(jq '[.skipped_prs[] | select(.pr_repo == "nativeapp")] | length' ai_response.json)
          TOTAL_SKIPPED=$((WEBAPP_SKIPPED + NATIVEAPP_SKIPPED))

          echo "sns_items=$SNS_ITEMS" >> $GITHUB_OUTPUT
          echo "clweb_items=$CLWEB_ITEMS" >> $GITHUB_OUTPUT
          echo "total_skipped=$TOTAL_SKIPPED" >> $GITHUB_OUTPUT

          # サービス別のJSONを作成
          jq '{has_impact: true, items: [.items[] | select(.target_section == "一般ユーザー向け")], skipped_prs: .skipped_prs}' ai_response.json > sns_response.json
          jq '{has_impact: true, items: [.items[] | select(.target_section == "公式リクルーター向け")], skipped_prs: .skipped_prs}' ai_response.json > clweb_response.json

      - name: Create SNS PR if items exist
        id: create-sns-pr
        if: steps.prepare-data.outputs.sns_items != '0'
        env:
          GH_TOKEN: ${{ secrets.PAT_GITHUB }}
        run: |
          # ブランチ作成
          DATE=$(date '+%Y%m%d')
          BRANCH="auto/help-update-sns-$DATE"
          git checkout -b $BRANCH

          # AI分析結果をファイルに保存
          mkdir -p .github/help-updates
          cp sns_response.json .github/help-updates/sns-$DATE.json

          # コミット
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/help-updates/
          git commit -m "Add SNS help page update suggestions for $DATE"
          git push origin $BRANCH

          # ラベルを抽出
          LABELS=$(jq -r '[.items[].labels[]] | unique | join(",")' sns_response.json)
          if [ -z "$LABELS" ]; then
            LABELS="help:review"
          fi

          SNS_ITEMS="${{ steps.prepare-data.outputs.sns_items }}"
          TOTAL_SKIPPED="${{ steps.prepare-data.outputs.total_skipped }}"

          # PR本文を生成
          {
            echo "## 📱 SNS ヘルプページ更新提案"
            echo ""
            echo "### サマリ"
            echo ""
            echo "| 項目 | 件数 |"
            echo "|------|------|"
            echo "| 更新が必要 | $SNS_ITEMS 件 |"
            echo "| スキップ | $TOTAL_SKIPPED 件 |"
            echo ""
            echo "---"
            echo ""
            echo "## 更新項目"
            echo ""
            jq -r '.items[] | "### [\(.pr_repo)#\(.pr_number)](\(.pr_url)): \(.pr_title)\n- **アクション**: `\(.action)`\n- **対象**: `\(.target_path)`\n- **理由**: \(.reason)\n- **提案内容**:\n  > \(.suggestion)\n"' sns_response.json

            echo "---"
            echo ""
            echo "<details>"
            echo "<summary>スキップしたPR（$TOTAL_SKIPPED 件）</summary>"
            echo ""

            WEBAPP_SKIPPED=$(jq '[.skipped_prs[] | select(.pr_repo == "webapp")] | length' sns_response.json)
            NATIVEAPP_SKIPPED=$(jq '[.skipped_prs[] | select(.pr_repo == "nativeapp")] | length' sns_response.json)

            if [ "$WEBAPP_SKIPPED" -gt 0 ]; then
              echo "### webapp"
              echo ""
              jq -r '.skipped_prs[] | select(.pr_repo == "webapp") | "- [\(.pr_repo)#\(.pr_number)](https://github.com/team-youtrust/youtrust-webapp/pull/\(.pr_number)) \(.pr_title): \(.reason)"' sns_response.json
              echo ""
            fi

            if [ "$NATIVEAPP_SKIPPED" -gt 0 ]; then
              echo "### nativeapp"
              echo ""
              jq -r '.skipped_prs[] | select(.pr_repo == "nativeapp") | "- [\(.pr_repo)#\(.pr_number)](https://github.com/team-youtrust/youtrust-nativeapp/pull/\(.pr_number)) \(.pr_title): \(.reason)"' sns_response.json
              echo ""
            fi

            echo "</details>"
            echo ""
            echo "---"
            echo ""
            echo "> [!NOTE]"
            echo "> このPRはAIによる自動分析で作成されました（SNS: ユーザー向けヘルプページ）。"
            echo "> 内容を確認し、必要に応じてヘルプページを手動で編集してください。"
          } > sns_pr_body.md

          # PR作成
          PR_URL=$(gh pr create \
            --title "【SNS】ヘルプページ更新提案 ($DATE)" \
            --body-file sns_pr_body.md \
            --label "$LABELS" \
            --base main \
            --head $BRANCH)
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

          # mainに戻る
          git checkout main

      - name: Create CLWeb PR if items exist
        id: create-clweb-pr
        if: steps.prepare-data.outputs.clweb_items != '0'
        env:
          GH_TOKEN: ${{ secrets.PAT_GITHUB }}
        run: |
          # ブランチ作成
          DATE=$(date '+%Y%m%d')
          BRANCH="auto/help-update-clweb-$DATE"
          git checkout -b $BRANCH

          # AI分析結果をファイルに保存
          mkdir -p .github/help-updates
          cp clweb_response.json .github/help-updates/clweb-$DATE.json

          # コミット
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/help-updates/
          git commit -m "Add CLWeb help page update suggestions for $DATE"
          git push origin $BRANCH

          # ラベルを抽出
          LABELS=$(jq -r '[.items[].labels[]] | unique | join(",")' clweb_response.json)
          if [ -z "$LABELS" ]; then
            LABELS="help:review"
          fi

          CLWEB_ITEMS="${{ steps.prepare-data.outputs.clweb_items }}"
          TOTAL_SKIPPED="${{ steps.prepare-data.outputs.total_skipped }}"

          # PR本文を生成
          {
            echo "## 💼 CLWeb ヘルプページ更新提案"
            echo ""
            echo "### サマリ"
            echo ""
            echo "| 項目 | 件数 |"
            echo "|------|------|"
            echo "| 更新が必要 | $CLWEB_ITEMS 件 |"
            echo "| スキップ | $TOTAL_SKIPPED 件 |"
            echo ""
            echo "---"
            echo ""
            echo "## 更新項目"
            echo ""
            jq -r '.items[] | "### [\(.pr_repo)#\(.pr_number)](\(.pr_url)): \(.pr_title)\n- **アクション**: `\(.action)`\n- **対象**: `\(.target_path)`\n- **理由**: \(.reason)\n- **提案内容**:\n  > \(.suggestion)\n"' clweb_response.json

            echo "---"
            echo ""
            echo "<details>"
            echo "<summary>スキップしたPR（$TOTAL_SKIPPED 件）</summary>"
            echo ""

            WEBAPP_SKIPPED=$(jq '[.skipped_prs[] | select(.pr_repo == "webapp")] | length' clweb_response.json)

            if [ "$WEBAPP_SKIPPED" -gt 0 ]; then
              echo "### webapp"
              echo ""
              jq -r '.skipped_prs[] | select(.pr_repo == "webapp") | "- [\(.pr_repo)#\(.pr_number)](https://github.com/team-youtrust/youtrust-webapp/pull/\(.pr_number)) \(.pr_title): \(.reason)"' clweb_response.json
              echo ""
            fi

            echo "</details>"
            echo ""
            echo "---"
            echo ""
            echo "> [!NOTE]"
            echo "> このPRはAIによる自動分析で作成されました（CLWeb: リクルーター向けヘルプページ）。"
            echo "> 内容を確認し、必要に応じてヘルプページを手動で編集してください。"
          } > clweb_pr_body.md

          # PR作成
          PR_URL=$(gh pr create \
            --title "【CLWeb】ヘルプページ更新提案 ($DATE)" \
            --body-file clweb_pr_body.md \
            --label "$LABELS" \
            --base main \
            --head $BRANCH)
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

          # mainに戻る
          git checkout main

      # Slackチャンネルを分ける場合は SLACK_CHANNEL_ID_SNS と SLACK_CHANNEL_ID_CLWEB を別の値に設定してください
      - name: Send SNS Slack notification
        if: steps.prepare-data.outputs.sns_items != '0'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID_SNS }}
        run: |
          PR_URL="${{ steps.create-sns-pr.outputs.pr_url }}"
          SNS_ITEMS="${{ steps.prepare-data.outputs.sns_items }}"
          TOTAL_SKIPPED="${{ steps.prepare-data.outputs.total_skipped }}"

          # 更新項目のサマリを生成（PRリンク付き）
          ITEMS_SUMMARY=$(jq -r '.items[] | "• <\(.pr_url)|\(.pr_repo)#\(.pr_number)> \(.pr_title | .[0:30]) → `\(.target_path)`"' sns_response.json | head -5)

          # Slack APIで通知を送信
          curl -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(cat <<EOF
          {
            "channel": "$SLACK_CHANNEL_ID",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "📱 SNS ヘルプページ更新提案",
                  "emoji": true
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*更新が必要:*\n${SNS_ITEMS}件"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*スキップ:*\n${TOTAL_SKIPPED}件"
                  }
                ]
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*対象:*\n${ITEMS_SUMMARY}"
                }
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "PRを確認",
                      "emoji": true
                    },
                    "url": "${PR_URL}",
                    "style": "primary"
                  },
                  {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "マージする",
                      "emoji": true
                    },
                    "url": "${PR_URL}",
                    "style": "danger"
                  }
                ]
              }
            ]
          }
          EOF
          )"

      # Slackチャンネルを分ける場合は SLACK_CHANNEL_ID_SNS と SLACK_CHANNEL_ID_CLWEB を別の値に設定してください
      - name: Send CLWeb Slack notification
        if: steps.prepare-data.outputs.clweb_items != '0'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID_CLWEB }}
        run: |
          PR_URL="${{ steps.create-clweb-pr.outputs.pr_url }}"
          CLWEB_ITEMS="${{ steps.prepare-data.outputs.clweb_items }}"
          TOTAL_SKIPPED="${{ steps.prepare-data.outputs.total_skipped }}"

          # 更新項目のサマリを生成（PRリンク付き）
          ITEMS_SUMMARY=$(jq -r '.items[] | "• <\(.pr_url)|\(.pr_repo)#\(.pr_number)> \(.pr_title | .[0:30]) → `\(.target_path)`"' clweb_response.json | head -5)

          # Slack APIで通知を送信
          curl -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(cat <<EOF
          {
            "channel": "$SLACK_CHANNEL_ID",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "💼 CLWeb ヘルプページ更新提案",
                  "emoji": true
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*更新が必要:*\n${CLWEB_ITEMS}件"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*スキップ:*\n${TOTAL_SKIPPED}件"
                  }
                ]
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*対象:*\n${ITEMS_SUMMARY}"
                }
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "PRを確認",
                      "emoji": true
                    },
                    "url": "${PR_URL}",
                    "style": "primary"
                  },
                  {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "マージする",
                      "emoji": true
                    },
                    "url": "${PR_URL}",
                    "style": "danger"
                  }
                ]
              }
            ]
          }
          EOF
          )"

      # 更新が不要な場合の通知（どちらかのチャンネルに送信）
      - name: Send no-update Slack notification
        if: steps.combine.outputs.total != '0' && steps.save.outputs.has_impact != 'true'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID_SNS }}
        run: |
          TOTAL_PRS="${{ steps.combine.outputs.total }}"
          WEBAPP_PRS="${{ steps.webapp-prs.outputs.count }}"
          NATIVEAPP_PRS="${{ steps.nativeapp-prs.outputs.count }}"

          # スキップされたPR数を取得
          SKIPPED_COUNT=0
          if [ -f ai_response.json ]; then
            SKIPPED_COUNT=$(jq '.skipped_prs | length' ai_response.json 2>/dev/null || echo "0")
          fi

          # Slack APIで通知を送信
          curl -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(cat <<EOF
          {
            "channel": "$SLACK_CHANNEL_ID",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "✅ ヘルプページ更新チェック完了",
                  "emoji": true
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "本日のPRを確認しましたが、ヘルプページの更新が必要な変更はありませんでした。"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*分析したPR:*\n${TOTAL_PRS}件"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*スキップ:*\n${SKIPPED_COUNT}件"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*webapp:*\n${WEBAPP_PRS}件"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*nativeapp:*\n${NATIVEAPP_PRS}件"
                  }
                ]
              }
            ]
          }
          EOF
          )"

      - name: Summary
        if: always()
        run: |
          echo "## Check Help Updates Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- webapp PRs: ${{ steps.webapp-prs.outputs.count || 0 }}" >> $GITHUB_STEP_SUMMARY
          echo "- nativeapp PRs: ${{ steps.nativeapp-prs.outputs.count || 0 }}" >> $GITHUB_STEP_SUMMARY
          echo "- Total: ${{ steps.combine.outputs.total || 0 }}" >> $GITHUB_STEP_SUMMARY
          echo "- Batches: ${{ steps.combine.outputs.batch_count || 0 }}" >> $GITHUB_STEP_SUMMARY
          echo "- Has impact: ${{ steps.save.outputs.has_impact || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Service breakdown" >> $GITHUB_STEP_SUMMARY
          echo "- SNS items: ${{ steps.prepare-data.outputs.sns_items || 0 }}" >> $GITHUB_STEP_SUMMARY
          echo "- CLWeb items: ${{ steps.prepare-data.outputs.clweb_items || 0 }}" >> $GITHUB_STEP_SUMMARY
          echo "- SNS PR: ${{ steps.create-sns-pr.outputs.pr_url || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "- CLWeb PR: ${{ steps.create-clweb-pr.outputs.pr_url || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
